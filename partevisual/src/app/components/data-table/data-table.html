<!-- Search Bar -->
<div *ngIf="searchable() && !loading()" class="mb-4">
  <div class="relative">
    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-[18px] h-[18px] text-dark-400">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
      </svg>
    </div>
    <input
      type="text"
      [ngModel]="searchTerm()"
      (ngModelChange)="onSearchChange($event)"
      placeholder="Buscar en todos los campos..."
      class="glass-input w-full pl-11 pr-4 py-2.5 rounded-xl text-sm placeholder-dark-500 focus:ring-0" />
  </div>
</div>

<!-- Loading Skeleton -->
<div *ngIf="loading()" class="space-y-3">
  <div class="h-10 bg-dark-800/60 rounded-xl animate-pulse"></div>
  <div *ngFor="let i of [1,2,3,4,5]" class="h-12 bg-dark-800/40 rounded-xl animate-pulse" [style.animation-delay]="i * 80 + 'ms'"></div>
</div>

<!-- Data Table -->
<div *ngIf="!loading()" class="overflow-x-auto rounded-2xl border border-white/5">
  <!-- Empty State -->
  <div *ngIf="filteredRows().length === 0" class="flex flex-col items-center justify-center py-16 px-4">
    <div class="w-16 h-16 rounded-2xl bg-dark-800 flex items-center justify-center mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-dark-500">
        <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z" />
      </svg>
    </div>
    <p class="text-dark-400 text-sm font-medium">{{ emptyMessage() }}</p>
    <p *ngIf="searchTerm()" class="text-dark-500 text-xs mt-1">Intenta con otro término de búsqueda</p>
    <p *ngIf="!searchTerm()" class="text-dark-500 text-xs mt-1">Agrega un nuevo registro para comenzar</p>
  </div>

  <!-- Table -->
  <table *ngIf="filteredRows().length > 0" class="w-full text-sm text-left">
    <thead>
      <tr class="border-b border-white/5 bg-dark-900/50">
        <th *ngFor="let col of columns()"
            class="px-5 py-3.5 text-xs font-semibold text-dark-400 uppercase tracking-wider whitespace-nowrap">
          {{ col.label }}
        </th>
        <th class="px-5 py-3.5 text-xs font-semibold text-dark-400 uppercase tracking-wider text-right">
          Acciones
        </th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of filteredRows(); let i = index"
          class="border-b border-white/[0.03] hover:bg-brand-500/[0.04] transition-colors duration-200 cursor-pointer group"
          [class.bg-dark-800/20]="i % 2 === 0"
          (click)="onRowClick(row)">
        <td *ngFor="let col of columns()"
            class="px-5 py-3.5 text-dark-200 whitespace-nowrap font-medium">
          {{ row[col.key] ?? '—' }}
        </td>
        <td class="px-5 py-3.5 text-right whitespace-nowrap">
          <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
            <button (click)="onEditClick($event, row)"
                    class="p-2 rounded-lg bg-brand-500/10 text-brand-400 hover:bg-brand-500/20 hover:text-brand-300 transition-all duration-200"
                    title="Editar">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
              </svg>
            </button>
            <button (click)="onDeleteClick($event, row)"
                    class="p-2 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500/20 hover:text-red-300 transition-all duration-200"
                    title="Eliminar">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
              </svg>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
