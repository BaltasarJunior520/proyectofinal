@if (isOpen()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4"
       (click)="onBackdropClick($event)">
    <div class="absolute inset-0 bg-dark-950/80 backdrop-blur-sm animate-fade-in"></div>
    <div class="relative w-full max-h-[90vh] overflow-y-auto glass-panel rounded-2xl border border-white/[0.08] shadow-2xl shadow-black/40 animate-slide-up"
         [ngClass]="sizeClass()"
         (click)="$event.stopPropagation()">
      <div class="flex items-center justify-between px-6 py-4 border-b border-white/[0.06]">
        <h3 class="text-lg font-bold text-white tracking-tight">{{ title() }}</h3>
        <button (click)="closeModal.emit()"
                class="p-1.5 rounded-lg hover:bg-dark-700 text-dark-400 hover:text-white transition-all duration-200">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="px-6 py-5">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
}
