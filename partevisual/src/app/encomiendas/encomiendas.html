<!-- Toast Messages -->
<div class="fixed top-6 right-6 z-[100] space-y-3">
  <!-- Success Toast -->
  <div *ngIf="successMessage()"
       class="flex items-center gap-3 px-5 py-3.5 rounded-xl bg-green-500/15 border border-green-500/30 text-green-300 shadow-lg shadow-green-900/20 animate-slide-up backdrop-blur-sm">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-green-400 shrink-0">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
    </svg>
    <span class="text-sm font-medium">{{ successMessage() }}</span>
  </div>
  <!-- Error Toast -->
  <div *ngIf="errorMessage()"
       class="flex items-center gap-3 px-5 py-3.5 rounded-xl bg-red-500/15 border border-red-500/30 text-red-300 shadow-lg shadow-red-900/20 animate-slide-up backdrop-blur-sm">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-red-400 shrink-0">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
    </svg>
    <span class="text-sm font-medium">{{ errorMessage() }}</span>
  </div>
</div>

<div class="space-y-6 animate-fade-in">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white via-white to-brand-300">
        Gestión de Encomiendas
      </h1>
      <p class="text-sm text-dark-400 mt-1">Administra paquetes, detalles y seguros de encomiendas</p>
    </div>
    <button (click)="openCreate()"
            class="flex items-center gap-2 px-5 py-2.5 bg-brand-500 hover:bg-brand-600 text-white font-semibold text-sm rounded-xl transition-all duration-200 hover:scale-[1.02] shadow-lg shadow-brand-500/25">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
      Nueva Encomienda
    </button>
  </div>

  <!-- Data Table -->
  <div class="glass-panel rounded-2xl p-1">
    <app-data-table
      [columns]="tableColumns"
      [rows]="tableRows()"
      [loading]="loading()"
      (editClick)="openEdit($event)"
      (deleteClick)="deleteEnc($event)">
    </app-data-table>
  </div>
</div>

<!-- Create/Edit Modal -->
<app-modal
  [isOpen]="showModal()"
  [title]="modalTitle()"
  [size]="'lg'"
  (closeModal)="closeModal()">

  <form (ngSubmit)="save()" class="space-y-6">

    <!-- Row 1: Código & Descripción -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-dark-300 uppercase tracking-wider">Código</label>
        <input type="text"
               class="glass-input w-full px-4 py-2.5 rounded-xl text-sm placeholder-dark-500"
               placeholder="ENC-001"
               [ngModel]="formCodigo()"
               (ngModelChange)="formCodigo.set($event)"
               name="codigo" />
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-dark-300 uppercase tracking-wider">Descripción</label>
        <input type="text"
               class="glass-input w-full px-4 py-2.5 rounded-xl text-sm placeholder-dark-500"
               placeholder="Descripción de la encomienda"
               [ngModel]="formDescripcion()"
               (ngModelChange)="formDescripcion.set($event)"
               name="descripcion" />
      </div>
    </div>

    <!-- Row 2: Remitente & Destinatario -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-dark-300 uppercase tracking-wider">Remitente</label>
        <select class="glass-input w-full px-4 py-2.5 rounded-xl text-sm"
                [ngModel]="formRemitenteId()"
                (ngModelChange)="formRemitenteId.set(+$event)"
                name="remitenteId">
          <option [value]="0" disabled>Seleccionar remitente...</option>
          <option *ngFor="let c of clientes()" [value]="c.id">
            {{ c.nombre }} {{ c.apellido }} — CI: {{ c.ci }}
          </option>
        </select>
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-dark-300 uppercase tracking-wider">Destinatario</label>
        <select class="glass-input w-full px-4 py-2.5 rounded-xl text-sm"
                [ngModel]="formDestinatarioId()"
                (ngModelChange)="formDestinatarioId.set(+$event)"
                name="destinatarioId">
          <option [value]="0" disabled>Seleccionar destinatario...</option>
          <option *ngFor="let c of clientes()" [value]="c.id">
            {{ c.nombre }} {{ c.apellido }} — CI: {{ c.ci }}
          </option>
        </select>
      </div>
    </div>

    <!-- Row 3: Peso, Volumen, Valor Declarado -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-dark-300 uppercase tracking-wider">Peso (kg)</label>
        <input type="number" step="0.01"
               class="glass-input w-full px-4 py-2.5 rounded-xl text-sm placeholder-dark-500"
               placeholder="0.00"
               [ngModel]="formPeso()"
               (ngModelChange)="formPeso.set(+$event)"
               name="peso" />
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-dark-300 uppercase tracking-wider">Volumen (m³)</label>
        <input type="number" step="0.01"
               class="glass-input w-full px-4 py-2.5 rounded-xl text-sm placeholder-dark-500"
               placeholder="0.00"
               [ngModel]="formVolumen()"
               (ngModelChange)="formVolumen.set(+$event)"
               name="volumen" />
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-dark-300 uppercase tracking-wider">Valor Declarado (Bs.)</label>
        <input type="number" step="0.01"
               class="glass-input w-full px-4 py-2.5 rounded-xl text-sm placeholder-dark-500"
               placeholder="0.00"
               [ngModel]="formValorDeclarado()"
               (ngModelChange)="formValorDeclarado.set(+$event)"
               name="valorDeclarado" />
      </div>
    </div>

    <!-- Detalles Section -->
    <div class="space-y-3">
      <div class="flex items-center justify-between">
        <h4 class="text-sm font-bold text-white flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4 text-brand-400">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm-.375 5.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
          </svg>
          Detalles del Paquete
        </h4>
        <button type="button"
                (click)="addDetalle()"
                class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-brand-400 bg-brand-500/10 hover:bg-brand-500/20 rounded-lg transition-all duration-200 border border-brand-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          Agregar
        </button>
      </div>

      <div class="rounded-xl border border-white/[0.06] bg-dark-900/40 p-3 space-y-3">
        <!-- Empty state -->
        <div *ngIf="formDetalles().length === 0" class="text-center py-6">
          <p class="text-xs text-dark-500">No hay detalles agregados. Haz clic en "Agregar" para añadir uno.</p>
        </div>

        <!-- Detail rows -->
        <div *ngFor="let det of formDetalles(); let i = index"
             class="flex flex-col sm:flex-row items-start sm:items-end gap-3 p-3 rounded-xl bg-dark-800/40 border border-white/[0.04] animate-fade-in">
          <div class="flex-1 space-y-1.5 w-full sm:w-auto">
            <label class="text-[10px] font-semibold text-dark-400 uppercase tracking-wider">Tipo Paquete</label>
            <select class="glass-input w-full px-3 py-2 rounded-lg text-xs"
                    [ngModel]="det.tipoId"
                    (ngModelChange)="det.tipoId = +$event"
                    [name]="'tipoId_' + i">
              <option *ngFor="let tipo of tiposPaquete" [value]="tipo.id">{{ tipo.nombre }}</option>
            </select>
          </div>
          <div class="w-full sm:w-24 space-y-1.5">
            <label class="text-[10px] font-semibold text-dark-400 uppercase tracking-wider">Cantidad</label>
            <input type="number" min="1"
                   class="glass-input w-full px-3 py-2 rounded-lg text-xs"
                   [ngModel]="det.cantidad"
                   (ngModelChange)="det.cantidad = +$event"
                   [name]="'cantidad_' + i" />
          </div>
          <div class="flex-1 space-y-1.5 w-full sm:w-auto">
            <label class="text-[10px] font-semibold text-dark-400 uppercase tracking-wider">Observaciones</label>
            <input type="text"
                   class="glass-input w-full px-3 py-2 rounded-lg text-xs placeholder-dark-500"
                   placeholder="Notas adicionales..."
                   [ngModel]="det.observaciones"
                   (ngModelChange)="det.observaciones = $event"
                   [name]="'obs_' + i" />
          </div>
          <button type="button"
                  (click)="removeDetalle(i)"
                  class="p-2 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500/20 hover:text-red-300 transition-all duration-200 self-end shrink-0"
                  title="Eliminar detalle">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Seguro Section -->
    <div class="space-y-3">
      <div class="flex items-center gap-3">
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox"
                 class="sr-only peer"
                 [ngModel]="formIncluirSeguro()"
                 (ngModelChange)="formIncluirSeguro.set($event)"
                 name="incluirSeguro" />
          <div class="w-9 h-5 bg-dark-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-brand-500 after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all"></div>
        </label>
        <h4 class="text-sm font-bold text-white flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4 text-brand-400">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
          </svg>
          Incluir Seguro
        </h4>
      </div>

      <div *ngIf="formIncluirSeguro()"
           class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4 rounded-xl border border-brand-500/20 bg-brand-500/[0.03] animate-fade-in">
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-dark-300 uppercase tracking-wider">Monto del Seguro (Bs.)</label>
          <input type="number" step="0.01"
                 class="glass-input w-full px-4 py-2.5 rounded-xl text-sm placeholder-dark-500"
                 placeholder="0.00"
                 [ngModel]="formSeguroMonto()"
                 (ngModelChange)="formSeguroMonto.set(+$event)"
                 name="seguroMonto" />
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-dark-300 uppercase tracking-wider">Descripción del Seguro</label>
          <input type="text"
                 class="glass-input w-full px-4 py-2.5 rounded-xl text-sm placeholder-dark-500"
                 placeholder="Cobertura contra daños..."
                 [ngModel]="formSeguroDescripcion()"
                 (ngModelChange)="formSeguroDescripcion.set($event)"
                 name="seguroDescripcion" />
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center justify-end gap-3 pt-4 border-t border-white/[0.06]">
      <button type="button"
              (click)="closeModal()"
              class="px-5 py-2.5 text-sm font-semibold text-dark-300 hover:text-white bg-dark-800 hover:bg-dark-700 rounded-xl transition-all duration-200 border border-white/[0.06]">
        Cancelar
      </button>
      <button type="submit"
              class="px-6 py-2.5 text-sm font-semibold text-white bg-brand-500 hover:bg-brand-600 rounded-xl transition-all duration-200 shadow-lg shadow-brand-500/25 hover:scale-[1.02]">
        {{ editingEncomienda() ? 'Actualizar' : 'Guardar' }}
      </button>
    </div>
  </form>
</app-modal>
