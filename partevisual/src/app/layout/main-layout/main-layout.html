<div class="h-screen w-screen flex overflow-hidden bg-dark-950 font-sans">
  
  <!-- Sidebar -->
  <app-sidebar [isOpen]="sidebarOpen()"></app-sidebar>
  
  <!-- Backdrop for mobile devices when sidebar is open -->
  @if (sidebarOpen()) {
    <div 
      (click)="toggleSidebar()" 
      class="fixed inset-0 z-20 bg-black/60 backdrop-blur-sm md:hidden"
    ></div>
  }
  
  <!-- Primary Content Area -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
    
    <!-- Topbar -->
    <app-topbar 
      [sidebarOpen]="sidebarOpen()" 
      (toggleSidebar)="toggleSidebar()"
    ></app-topbar>
    
    <!-- Scrollable Main Viewport -->
    <main class="flex-1 overflow-y-auto p-6 md:p-8 pb-4 bg-dark-950 relative">
      <!-- Glow decoration underlay for modern look -->
      <div class="absolute top-0 right-1/4 w-[500px] h-[500px] bg-brand-500/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>
      <div class="absolute bottom-0 left-1/4 w-[400px] h-[400px] bg-brand-600/5 rounded-full blur-[80px] pointer-events-none -z-10"></div>
      
      <!-- Embedded Outlet View -->
      <div class="max-w-7xl mx-auto animate-fade-in">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- Footer -->
    <footer class="flex-shrink-0 border-t border-dark-800/60 bg-dark-900/80 backdrop-blur-sm">
      <div class="flex items-center justify-center gap-3 px-6 py-3 text-xs text-dark-400">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-5 h-5 text-brand-500">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-1.605.42-3.113 1.157-4.418" />
        </svg>
        <span class="tracking-wider font-semibold text-dark-300">PROYECTO FINAL DESARROLLO FULLSTACK 2026</span>
      </div>
    </footer>
    
  </div>
  
</div>
