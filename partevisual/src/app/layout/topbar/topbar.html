<header class="h-16 bg-dark-900 border-b border-white/5 flex items-center justify-between px-6 z-20 sticky top-0">
  <!-- Left section: Sidebar Toggle and Breadcrumb -->
  <div class="flex items-center gap-4">
    <button 
      (click)="triggerToggleSidebar()" 
      class="text-dark-400 hover:text-white p-1.5 rounded-lg hover:bg-white/[0.03] transition-colors focus:outline-none"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>
    <div class="text-sm font-semibold text-white tracking-wide hidden sm:block">
      Sistema de Gestión de Encomiendas (SGE)
    </div>
  </div>

  <!-- Right section: System Utilities & Profile Actions -->
  <div class="flex items-center gap-3">
    <!-- Fullscreen Button -->
    <button 
      (click)="toggleFullscreen()" 
      class="text-dark-400 hover:text-white p-1.5 rounded-lg hover:bg-white/[0.03] transition-colors focus:outline-none"
      title="Alternar pantalla completa"
    >
      @if (isFullscreen) {
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 9V4.5M9 9H4.5M9 9 3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5M15 15l5.25 5.25" />
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75v4.5m0-4.5h-4.5m4.5 0L15 9m5.25 11.25v-4.5m0 4.5h-4.5m4.5 0-5.25-5.25" />
        </svg>
      }
    </button>

    <!-- Logout Action Button -->
    <button 
      (click)="onLogout()" 
      class="flex items-center gap-2 px-3.5 py-1.5 rounded-lg bg-red-500/10 hover:bg-red-500/20 text-red-400 hover:text-red-300 border border-red-500/10 hover:border-red-500/20 text-xs font-semibold tracking-wide transition-all focus:outline-none"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
      </svg>
      <span class="hidden sm:inline">Cerrar Sesión</span>
    </button>
  </div>
</header>
