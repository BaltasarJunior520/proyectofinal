<div class="min-h-screen w-screen flex items-center justify-center bg-dark-950 font-sans relative overflow-hidden px-4">
  <!-- Glowing Background Orbs -->
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-brand-500/10 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute -bottom-40 -right-40 w-[450px] h-[450px] bg-brand-600/10 rounded-full blur-[140px] pointer-events-none"></div>

  <!-- Central Card Container -->
  <div class="w-full max-w-md glass-panel p-8 rounded-2xl shadow-2xl relative animate-slide-up z-10">
    <!-- Brand Logo and Header -->
    <div class="text-center mb-8">
      <div class="w-12 h-12 mx-auto rounded-xl bg-gradient-to-tr from-brand-600 to-brand-400 flex items-center justify-center shadow-lg shadow-brand-500/25 mb-4 animate-bounce">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-white">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 0 1-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 0 0 6.16-12.12A14.98 14.98 0 0 0 9.63 9.89a14.98 14.98 0 0 0-6.17 12.12 14.98 14.98 0 0 0 12.13-6.16ZM9.75 9.75c0 .41-.34.75-.75.75a.75.75 0 0 1-.75-.75c0-.41.34-.75.75-.75s.75.34.75.75Z" />
        </svg>
      </div>
      <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white via-white to-brand-200">SGE Logistics</h2>
      <p class="text-xs text-dark-400 mt-1.5 tracking-wide">Sistema de Gestión de Encomiendas</p>
    </div>

    <!-- Error Alert Block -->
    @if (errorMessage) {
      <div class="mb-5 p-3.5 rounded-lg bg-red-500/10 border border-red-500/25 text-red-400 text-xs flex items-center gap-2.5 animate-fade-in">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 flex-shrink-0">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
        </svg>
        <span>{{ errorMessage }}</span>
      </div>
    }

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <!-- Username Field -->
      <div>
        <label for="username" class="block text-xs font-semibold text-dark-300 uppercase tracking-wider mb-2">Usuario</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-dark-400 pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
          </span>
          <input 
            type="text" 
            id="username" 
            formControlName="username" 
            placeholder="Introduce tu usuario"
            class="w-full pl-10 pr-4 py-2.5 rounded-lg glass-input text-sm"
            [attr.disabled]="isLoading ? true : null"
            required
          />
        </div>
      </div>

      <!-- Password Field -->
      <div>
        <label for="contrasena" class="block text-xs font-semibold text-dark-300 uppercase tracking-wider mb-2">Contraseña</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-dark-400 pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
            </svg>
          </span>
          <input 
            type="password" 
            id="contrasena" 
            formControlName="contrasena" 
            placeholder="••••••••"
            class="w-full pl-10 pr-4 py-2.5 rounded-lg glass-input text-sm"
            [attr.disabled]="isLoading ? true : null"
            required
          />
        </div>
      </div>

      <!-- Action Button -->
      <button 
        type="submit" 
        [disabled]="loginForm.invalid || isLoading"
        class="w-full py-3 rounded-lg bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white font-semibold text-sm tracking-wide shadow-lg shadow-brand-500/20 active:scale-[0.98] transition-all disabled:opacity-50 disabled:pointer-events-none flex items-center justify-center gap-2 mt-7 focus:outline-none"
      >
        @if (isLoading) {
          <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>Accediendo...</span>
        } @else {
          <span>Iniciar Sesión</span>
        }
      </button>
    </form>
  </div>
</div>
